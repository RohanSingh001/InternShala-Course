<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Box</title>
    <link rel="stylesheet" href="aboutBox.css" />
  </head>
  <body>
    <p>This is without padding</p>
    <p id="padding">This is with padding</p>

    <p>This is without margin</p>
    <p id="margin">This is with margin</p>

    <span>This is without Height and Width</span>
    <span id="haw">This is with Height and Width</span>

    <div class="con">
      <span class="box">This is without Box Sizing</span>
      <span id="border" class="box">This is with Box Sizing = Border Box</span>
      <span id="content" class="box"
        >This is with Box Sizing = Content box</span
      >
    </div>
  </body>
</html>
