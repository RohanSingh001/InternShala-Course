<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Selectors</title>
    <link rel="stylesheet" href="selectors1.css" />
  </head>
  <body>
    <div>
      <ul>
        <li><a href="http://www.google.com" target="_blank">Google</a></li>
        <li><a href="http://www.facebook.com" target="_blank">Facebook</a></li>
      </ul>
    </div>
    <div>
      <p>
        <a href="http://www.internshala.com" target="_blank">Internshala</a>
      </p>
    </div>

    <h1>Grouping Selectors</h1>
    <h2>I am a Second Heading</h2>
    <p>i am para 1</p>
    <p>i am para 2</p>

    <form action="#">
      First Name <br />
      <input
        type="text"
        id="first-name"
        name="first-name"
        placeholder="Enter first name"
        value="Rohan"
        required
      />
      <br />
      Last Name <br />
      <input
        type="text"
        id="last-name"
        name="last-name"
        placeholder="Enter last name"
        value="Jaat"
        required
      />
      <br />
      Password <br />
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter password"
        value="ushsg"
        required
      />
      <br />
      <input type="submit" value="submit" />
    </form>
  </body>
</html>
