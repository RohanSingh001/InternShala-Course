<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
  </head>
  <body>
    <!-- Forms -->

    <h4>Forms</h4>

    <form action="">
      <input type="text" name="email" />
      <input type="password" name="password" />

      <br />

      <input type="radio" name="gender" value="male" /> Male
      <input type="radio" name="gender" value="female" /> Female
      <input type="radio" name="gender" value="others" /> Others

      <br />

      <input type="checkbox" name="intrest" value="Dhurander" /> Dhurander
      <input type="checkbox" name="intrest" value="Dhurander 2" /> Dhurander 2
      <input type="checkbox" name="intrest" value="KGF" /> KGF
      <input type="checkbox" name="intrest" value="Salaar" /> Salaar

      <br />

      <select name="city">
        <option value="Kolkata">Kolkata</option>
        <option value="Delhi">Delhi</option>
        <option value="Goa">Goa</option>
        <option value="Mumbai">Mumbai</option>
      </select>

      <br />

      <textarea name="address" rows="6" cols="50">
        Write your address here...
      </textarea>

      <br />

      <input type="submit" name="submit" value="submit" />

      
    </form>
  </body>
</html>
