<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Html Tags 2</title>
  </head>
  <body>
    <!-- Formating Tags -->
    <p>This text is <b>Bold</b></p>
    <p>This text is <strong>Strong</strong></p>

    <!-- Italic or Emphasis -->
    <p>This text is <i>Italic</i></p>
    <p>This text is <em>Emphasis</em></p>

    <!-- Underline -->
    <p>This is <u>Underline</u></p>

    <!-- Image -->
    <img
      src="https://png.pngitem.com/pimgs/s/277-2770708_apache-http-server-logo-png-transparent-png.png"
      alt="Apache Server Logo"
    />
  </body>
</html>
