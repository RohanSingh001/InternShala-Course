<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists</title>
  </head>
  <body>
    <h4>Ordered list</h4>
    <ol type="I">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
      <li>Item 4</li>
      <li>Item 5</li>
    </ol>

    <h4>Unordered List</h4>
    <ul type="Square">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
      <li>Item 4</li>
      <li>Item 5</li>
    </ul>

    <h4>Description List</h4>
    <dl>
      <dt>Html</dt>
      <dd>* Hyper Text Markup Language</dd>

      <dt>Css</dt>
      <dd>* Cascading Style Sheets</dd>
    </dl>
  </body>
</html>
